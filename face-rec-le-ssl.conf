<IfModule mod_ssl.c>
<VirtualHost *:443>
      ServerName img.akademie-rs.de

      LimitRequestBody 524288000

      SetEnv proxy-initial-not-buffered 1
      SetEnv proxy-sendchunked 1

      ProxyPreserveHost On
      ProxyTimeout      3600
      Timeout           3600

      ProxyPass        / http://127.0.0.1:7865/ flushpackets=on
      ProxyPassReverse / http://127.0.0.1:7865/

      RequestHeader set X-Real-IP        "%{REMOTE_ADDR}s"
      RequestHeader set X-Forwarded-Proto "http"

      # Disable gzip compression for all API routes.
      # mod_deflate buffers the entire response body before compressing it,
      # which causes fetch()/res.json() in the browser to hang indefinitely.
      <Location /api>
          SetEnv no-gzip 1
          SetEnv dont-vary 1
      </Location>

      # For the admin streaming endpoints disable proxy keep-alive.
      # Without this, Apache holds the response in a keep-alive buffer waiting
      # to reuse the backend connection — the browser never receives the body.
      # proxy-nokeepalive forces Apache to flush as soon as uvicorn closes the
      # connection, which happens naturally at the end of each response.
      <Location /api/admin>
          SetEnv proxy-nokeepalive 1
      </Location>

SSLCertificateFile /etc/letsencrypt/live/img.akademie-rs.de/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/img.akademie-rs.de/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
