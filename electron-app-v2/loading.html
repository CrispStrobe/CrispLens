<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrispLens — Starting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      user-select: none;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    /* Logo / branding */
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      font-size: 48px;
      line-height: 1;
      filter: drop-shadow(0 0 18px rgba(100,160,255,0.5));
    }
    .app-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #c0d8ff;
    }
    .app-tagline {
      font-size: 11px;
      color: #4a5a78;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Spinner */
    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid #1e2a42;
      border-top-color: #5090d0;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status messages */
    .status-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 360px;
    }
    #status-msg {
      font-size: 13px;
      color: #8090b8;
      text-align: center;
      min-height: 1.4em;
      transition: opacity 0.2s;
    }
    #status-detail {
      font-size: 11px;
      color: #3a4a62;
      text-align: center;
      min-height: 1em;
      max-width: 340px;
      line-height: 1.5;
      word-break: break-all;
    }

    /* Error state */
    #error-box {
      display: none;
      margin-top: 8px;
      padding: 10px 14px;
      background: #2a1212;
      border: 1px solid #5a2828;
      border-radius: 6px;
      font-size: 11px;
      color: #e07070;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }

    /* Progress bar */
    .progress-bar-wrap {
      width: 240px;
      height: 3px;
      background: #1a1a2a;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3060a0, #60a0e0);
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .progress-bar.indeterminate {
      width: 40%;
      animation: indeterminate 1.4s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    /* Version badge */
    .version {
      position: absolute;
      bottom: 14px;
      right: 16px;
      font-size: 10px;
      color: #2a3050;
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <div class="logo-icon">🔍</div>
    <div class="app-name">CrispLens</div>
    <div class="app-tagline">Face Recognition System</div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div class="status-area">
    <div id="status-msg">Starting…</div>
    <div id="status-detail"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar indeterminate" id="progress-bar"></div>
    </div>
    <div id="error-box"></div>
  </div>

  <div class="version">v2</div>

  <script>
    const statusMsg    = document.getElementById('status-msg');
    const statusDetail = document.getElementById('status-detail');
    const errorBox     = document.getElementById('error-box');
    const spinner      = document.getElementById('spinner');
    const progressBar  = document.getElementById('progress-bar');

    function setStatus(msg, detail) {
      statusMsg.textContent = msg;
      statusDetail.textContent = detail || '';
    }

    function setError(msg) {
      errorBox.style.display = 'block';
      errorBox.textContent   = msg;
      spinner.style.borderTopColor = '#c05050';
      progressBar.classList.remove('indeterminate');
      progressBar.style.width = '100%';
      progressBar.style.background = '#6a2020';
    }

    function setDone() {
      statusMsg.textContent = 'Ready!';
      statusDetail.textContent = '';
      spinner.style.borderTopColor = '#50c878';
      progressBar.classList.remove('indeterminate');
      progressBar.style.width = '100%';
      progressBar.style.background = 'linear-gradient(90deg, #206040, #40a060)';
    }

    if (window.electronAPI) {
      window.electronAPI.onSetupLog(msg    => setStatus(msg));
      window.electronAPI.onSetupError(msg  => setError(msg));
      window.electronAPI.onSetupDone(()    => setDone());
      window.electronAPI.onSetupDetail(msg => { statusDetail.textContent = msg || ''; });
    }
  </script>
</body>
</html>
